- id: fix-prosody-pidfile
  title: 'Fix Prosody Docker config: add pidfile option to prosody.cfg.lua'
  description: |-
    The failing job is caused by Prosody (the XMPP server) not starting because the 'pidfile' option is missing from its configuration file. The error message repeated in the logs is:

    There is no 'pidfile' option in the configuration file, see https://prosody.im/doc/prosodyctl#pidfile for help

    Solution:
    Add the 'pidfile' option to your Prosody configuration. For example, in your Prosody config (commonly named prosody.cfg.lua or similar in your Docker context), add:

    pidfile = "/var/run/prosody/prosody.pid"

    Make sure this path is writable by the Prosody process inside the container. After making this change, rebuild your Docker image if needed and rerun the workflow. This should resolve the startup error and allow the e2e tests to proceed.
  status: Done
  priority: 1
  deps: []
  files: []
  tags: []
  metadata:
    started_at: '2026-03-25T17:13:52.367369+00:00'
    agent: afa
  created_at: '2026-03-25T15:32:10.074355Z'
  updated_at: '2026-03-25T17:17:54.163240Z'
