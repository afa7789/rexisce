name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rexisce-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rexisce-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rexisce-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rexisce-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev
      - run: cargo build --release --bin rexisce --target ${{ matrix.target }}
      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/rexisce ${{ matrix.artifact }}
      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\rexisce.exe ${{ matrix.artifact }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
